<g class='verses' style='font-family:Caladea' >
<g class='verse' >
<text x="81" y="495" >2. </text>
<text x="100" y="495" > Kerubim dan serafim</text>
<g class='footnotes' style="font-family:'Figtree';font-weight:600;font-style:italic;" >
<text x="245" y="495" >*)</text>
</g>
<text x="100" y="520" > memuliakan Yang Trisuci;</text>
<text x="100" y="545" > para rasul dan nabi,</text>
<text x="100" y="570" > martir yang berjubah putih</text>
<text x="100" y="595" > G&#39;reja yang kudus, esa,</text>
<text x="100" y="620" > kepadaMu menyembah.</text>
<g >
<path d="M146,522 Q150,527 154,522" style="fill:none;stroke:#000000;stroke-linecap:round;stroke-width:1.1" />
</g>
</g>
<g class='verse' >
<text x="81" y="680" >3. </text>
<text x="100" y="680" > Bapa agung dan kudus,</text>
<text x="100" y="705" > mahamurah dan rahmani,</text>
<text x="100" y="730" > Putra Tunggal, Penebus,</text>
<text x="100" y="755" > Roh, Penghibur yang sejati,</text>
<text x="100" y="780" > langit-bumiMu penuh</text>
<text x="100" y="805" > kemuliaan namaMu!</text>
<g >
<path d="M141,807 Q145,812 149,807" style="fill:none;stroke:#000000;stroke-linecap:round;stroke-width:1.1" />
</g>
</g>
<g class='verse' >
<text x="80" y="865" >4. </text>
<text x="100" y="865" > Kristus, Raja mulia,</text>
<text x="100" y="890" > Putra Bapa yang abadi,</text>
<text x="100" y="915" > Kautebus manusia</text>
<text x="100" y="940" > oleh kurbanMu di salib.</text>
<text x="100" y="965" > Kuasa maut menyerah,</text>
<text x="100" y="990" > sorga pun terbukalah!</text>
<g >
<path d="M110,967 Q116,972 122,967" style="fill:none;stroke:#000000;stroke-linecap:round;stroke-width:1.1" />
</g>
</g>
<g class='verse' >
<text x="465" y="495" >5. </text>
<text x="484" y="495" > TakhtaMu kekal teguh</text>
<text x="484" y="520" > pada Sisi kanan Bapa;</text>
<text x="484" y="545" > dalam penghakimanMu,</text>
<text x="484" y="570" > tolong umatMu yang papa:</text>
<text x="484" y="595" > diri kami yang lemah</text>
<text x="484" y="620" > dalam Dikau s&#39;lamatlah!</text>
<g >
</g>
</g>
<g class='verse' >
<text x="465" y="680" >6. </text>
<text x="484" y="680" > Tiap hari namaMu</text>
<text x="484" y="705" > kami puji dan muliakan</text>
<text x="484" y="730" > kini dan selalu t&#39;rus</text>
<text x="484" y="755" > sampai kesudahan zaman</text>
<text x="484" y="780" > Buat kami bertekun</text>
<text x="484" y="805" > hingga Hari DatangMu.</text>
<g >
<path d="M606,707 Q610,712 614,707" style="fill:none;stroke:#000000;stroke-linecap:round;stroke-width:1.1" />
</g>
</g>
<g class='verse' >
<text x="465" y="865" >7. </text>
<text x="484" y="865" > Tuhan kasihanilah!</text>
<text x="484" y="890" > Kasihani kami ini;</text>
<text x="484" y="915" > dalam cahya kurnia</text>
<text x="484" y="940" > tuntun yang telah Kaupilih.</text>
<text x="484" y="965" > Kau Harapan umatMu:</text>
<text x="484" y="990" > kasihMu kekal teguh!</text>
<g >
</g>
</g>
</g>
<g class='footnotes' style="font-size:60%;font-family:'Figtree';font-weight:600;font-style:italic" >
<text x="70" y="1030" >*)Kerubim dan serafim = jenis malaikat</text>
</g>
<g class='credit' style="font-size:60%;font-family:'Figtree';font-weight:600" >
<text x="50" y="1070" >Syair: </text>
<text x="80" y="1070"><tspan font-style="italic">Grosser Gott, wir loben dich,</tspan> Ignaz Franz 1768, menurut <tspan font-style="italic">Te Deum lau-Damus,</tspan> awal abad ke-5, terj. HA Pandopo/J.M. Malessy 1975/83</text><text x="50" y="1085">Lagu: Austria (Wina) 1774</text><text x="638" y="1085" >BE 21, NR 11</text>
