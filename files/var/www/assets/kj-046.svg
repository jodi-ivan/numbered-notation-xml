<text x="493" y="545" > ke pohon gandarusa,</text>
<text x="493" y="570" > terbungkam suaranya;</text>
<text x="493" y="595" > tetapi kasih Tuhan</text>
<text x="493" y="620" > di Galilea</text>
<text x="493" y="645" > Akhirnya menghiburkan</text>
<text x="493" y="670" > Haleluya!</text>
