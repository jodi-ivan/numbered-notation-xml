<g class='verse' >
<text x="81" y="705" >3. </text>
<text x="100" y="705" > Sudah lahir Jurus&#39;lamat—</text>
<text x="100" y="730" > itu berita lagunya.</text>
<text x="100" y="755" > Puji dan syukur dan hormat</text>
<text x="100" y="780" > dipersembahkan padaNya.</text>
<text x="100" y="805" > Gloria in excelsis Deo!</text>
<text x="100" y="830" > Gloria in excelcis Deo!</text>
