<text x="493" y="730" > Besarkan nama Tuhan</text>
<text x="493" y="755" > Haleluya;</text>
<text x="493" y="780" > di dunia serukan</text>
<text x="493" y="805" > kemuliaanNya!</text>
<text x="493" y="830" > JanjiNya dikukuhkan</text>
<text x="493" y="855" > demi manusia:</text>
