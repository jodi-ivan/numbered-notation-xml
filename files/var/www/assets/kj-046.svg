<g class='verses' style='font-family:Caladea' >
<g class='verse' >
<text x="81" y="495" >2. </text>
<text x="100" y="495" > Dib&#39;riNya hidup baru,</text>
<text x="100" y="520" > gelap menjadi t&#39;rang;</text>
<text x="100" y="545" > sabdaNya besertamu</text>
<text x="100" y="570" > di ngarai yang kelam.</text>
<text x="100" y="595" > Hai kamu yang selalu</text>
<text x="100" y="620" > padaNya berpegang,</text>
<text x="100" y="645" > Tak usah ragu-ragu:</text>
<text x="100" y="670" > tuntunanNya tent&#39;ram!</text>
<g >
</g>
</g>
<g class='verse' >
<text x="81" y="730" >3. </text>
<text x="100" y="730" > Di dalam kekurangan</text>
<text x="100" y="755" > —Kyrieleison—</text>
<g class='footnotes' style="font-family:'Figtree';font-weight:600;font-style:italic;font-size:60%;" >
<text x="278" y="755" >1) </text>
</g>
<text x="100" y="780" > di tanah pembuangan</text>
<text x="100" y="805" > di tanah Babilon</text>
<g class='footnotes' style="font-family:'Figtree';font-weight:600;font-style:italic;font-size:60%;" >
<text x="278" y="805" >2) </text>
</g>
<text x="100" y="830" > kendati musim zaman</text>
<text x="100" y="855" > menghitam dan mendung,</text>
<text x="100" y="880" > namaMu dibesarkan</text>
<text x="100" y="905" > pujian mendengung.</text>
<g >
</g>
</g>
<g class='verse' >
<text x="473" y="495" >4. </text>
<text x="493" y="495" > Kecapi digantungkan</text>
<text x="493" y="520" > —Miserikordia—</text>
<g class='footnotes' style="font-family:'Figtree';font-weight:600;font-style:italic;font-size:60%;" >
<text x="671" y="520" >3) </text>
