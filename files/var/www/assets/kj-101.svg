<g class='verse' >
<text x="457" y="520" >4. </text>
<text x="477" y="520" > Ikutilah, hai gembala,</text>
<text x="477" y="545" > nyanyian sorga yang merdu;</text>
<text x="477" y="570" > mainkan suling dan rebana</text>
<text x="477" y="595" > dan bersyukur di hatimu!</text>
<text x="477" y="620" > Gloria in excelsis Deo!</text>
<text x="477" y="645" > Gloria in excelcis Deo!</text>
<g >
<path d="M490,572 Q494,577 499,572" style="fill:none;stroke:#000000;stroke-linecap:round;stroke-width:1.1" />
</g>
</g>
<g class='verse' >
<text x="458" y="705" >5. </text>
<text x="477" y="705" > Mari, kita pun kesana</text>
<text x="477" y="730" > untuk melihat Putera.</text>
<text x="477" y="755" > Mari, kita persembahkan</text>
<text x="477" y="780" > suara dan hati padaNya!</text>
<text x="477" y="805" > Gloria in excelsis Deo!</text>
<text x="477" y="830" > Gloria in excelcis Deo!</text>
