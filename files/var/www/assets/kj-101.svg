<g class='verse' >
<text x="81" y="520" >2. </text>
<text x="100" y="520" > Hai gembala, kar&#39;na apa</text>
<text x="100" y="545" > sambutan ini menggegar?</text>
<text x="100" y="570" > Bagi Maharaja siapa</text>
<text x="100" y="595" > sorak sorgawi terdengar?</text>
<text x="100" y="620" > Gloria in excelsis Deo!</text>
<text x="100" y="645" > Gloria in excelcis Deo!</text>
